<title>aftrhrs</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    min-height: 100vh;
    width: 100%;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .logo-corner {
    position: absolute;
    top: 28px;
    left: 32px;
    opacity: 0;
    animation: fadeIn 1.2s ease forwards 0.3s;
  }
  .logo-corner img { height: 72px; width: auto; }
  @keyframes fadeIn { to { opacity: 1; } }
  .center-stage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    opacity: 0;
    animation: fadeIn 1.2s ease forwards 1s;
  }
  #letter-container { position: relative; height: 72px; }
  .letter {
    display: inline-block;
    font-size: 52px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1;
    position: absolute;
    top: 0;
    white-space: pre;
    font-family: 'Space Grotesk', sans-serif;
  }
  #measure-el {
    position: absolute;
    visibility: hidden;
    top: -999px;
    left: -999px;
    font-size: 52px;
    font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    white-space: pre;
  }
  .tagline {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: #666;
    text-transform: lowercase;
    opacity: 0;
    transition: opacity 1.8s ease;
    text-align: center;
  }
  .tagline.visible { opacity: 1; }
  .email {
    margin-top: 8px;
  }
  .email a {
    color: #ffffff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.2em;
  }
  .email a:hover {
    text-decoration: underline;
  }
</style>

<script>
(function() {
  const full   = "afterhourscreative.com.au";
  const target = "aftrhrs.au";

  const keepIndices = new Set();
  let fi = 0;
  for (let ti = 0; ti < target.length; ti++) {
    while (fi < full.length) {
      if (full[fi] === target[ti]) {
        keepIndices.add(fi);
        fi++;
        break;
      }
      fi++;
    }
  }

  const measureEl = document.getElementById('measure-el');
  function measureText(str) {
    measureEl.textContent = str;
    return measureEl.getBoundingClientRect().width;
  }

  document.fonts.ready.then(() => {
    const gap = 1;
    const charWidths = Array.from(full).map(ch => measureText(ch));

    const positions = [];
    let x = 0;
    for (let i = 0; i < full.length; i++) {
      positions.push(x);
      x += charWidths[i] + gap;
    }
    const totalWidth = x;

    const container = document.getElementById('letter-container');
    container.style.width = totalWidth + 'px';

    const spans = [];
    for (let i = 0; i < full.length; i++) {
      const s = document.createElement('span');
      s.className = 'letter';
      s.textContent = full[i];
      s.dataset.keep = keepIndices.has(i) ? 'true' : 'false';
      s.dataset.w = charWidths[i];
      s.style.left = positions[i] + 'px';
      s.style.opacity = '1';
      s.style.transition = 'none';
      container.appendChild(s);
      spans.push(s);
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    async function run() {
      await sleep(5000);

      const toFade = spans.filter(s => s.dataset.keep === 'false');
      toFade.forEach((s, i) => {
        setTimeout(() => {
          s.style.transition = 'opacity 1.8s ease, top 1.8s ease';
          s.style.opacity = '0';
          s.style.top = '-14px';
        }, i * 80);
      });

      await sleep(toFade.length * 80 + 2000);
      toFade.forEach(s => { s.style.visibility = 'hidden'; });
      await sleep(100);

      const keepSpans = spans.filter(s => s.dataset.keep === 'true');
      const targetWidth = measureText(target);
      const startX = (totalWidth - targetWidth) / 2;

      let cx = startX;
      keepSpans.forEach(s => {
        s.style.transition = 'left 1.1s cubic-bezier(0.4,0,0.2,1)';
        s.style.left = cx + 'px';
        cx += parseFloat(s.dataset.w) + gap;
      });

      await sleep(1300);
      document.getElementById('tagline').classList.add('visible');
    }

    run();
  });
})();
</script>
</body>
</html>
